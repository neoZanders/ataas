services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER_FILE: /run/secrets/spring.datasource.username
      POSTGRES_PASSWORD_FILE: /run/secrets/spring.datasource.password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - spring.datasource.username
      - spring.datasource.password

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    secrets:
      - spring.datasource.username
      - spring.datasource.password
      - app.jwt.secret
      - app.timeedit.api-key
      - app.timeedit.organization-id
    depends_on:
      - postgres

volumes:
  postgres_data:

secrets:
  spring.datasource.username:
    file: ./secrets/spring.datasource.username
  spring.datasource.password:
    file: ./secrets/spring.datasource.password
  app.jwt.secret:
    file: ./secrets/app.jwt.secret
  app.timeedit.api-key:
    file: ./secrets/app.timeedit.api-key
  app.timeedit.organization-id:
    file: ./secrets/app.timeedit.organization-id